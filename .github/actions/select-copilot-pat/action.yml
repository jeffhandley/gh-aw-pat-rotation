name: 'Select Copilot PAT from Pool'
description: >
  Selects a Copilot PAT from a numbered pool of secrets using round-robin
  with random fallback. Secrets are passed as environment variables
  COPILOT_PAT_0 through COPILOT_PAT_9 by the calling workflow step.

inputs:
  run-number:
    description: 'Run number for deterministic round-robin selection (typically github.run_number). Falls back to random if empty.'
    required: false
    default: ''

outputs:
  token:
    description: 'The selected token value (masked in logs)'
    value: ${{ steps.select.outputs.token }}
  pool-size:
    description: 'The number of non-empty secrets found in the pool'
    value: ${{ steps.select.outputs.pool_size }}

runs:
  using: composite
  steps:
    - id: select
      shell: bash
      env:
        RUN_NUMBER: ${{ inputs.run-number }}
      run: |
        # Collect all non-empty secret values from COPILOT_PAT_0..COPILOT_PAT_9
        TOKENS=()
        for i in $(seq 0 9); do
          var="COPILOT_PAT_${i}"
          val="${!var}"
          if [ -n "$val" ]; then
            TOKENS+=("$val")
          fi
        done

        if [ ${#TOKENS[@]} -eq 0 ]; then
          echo "::error::No Copilot PAT secrets found (checked COPILOT_PAT_0 through COPILOT_PAT_9)"
          exit 1
        fi

        # Round-robin by run number; fall back to random
        if [ -n "$RUN_NUMBER" ]; then
          IDX=$(( RUN_NUMBER % ${#TOKENS[@]} ))
          METHOD="round-robin (run #${RUN_NUMBER})"
        else
          IDX=$(( RANDOM % ${#TOKENS[@]} ))
          METHOD="random"
        fi

        SELECTED="${TOKENS[$IDX]}"
        echo "Selected token ${IDX} via ${METHOD} (pool size: ${#TOKENS[@]})"

        # Verify: must be a fine-grained PAT (prefix github_pat_)
        if [[ "$SELECTED" != github_pat_* ]]; then
          echo "::error::Selected token is not a fine-grained PAT (expected github_pat_ prefix). Classic PATs are not allowed."
          exit 1
        fi

        # Mask the token value so it never appears in logs
        echo "::add-mask::${SELECTED}"

        # Set outputs
        echo "token=${SELECTED}" >> "$GITHUB_OUTPUT"
        echo "pool_size=${#TOKENS[@]}" >> "$GITHUB_OUTPUT"
